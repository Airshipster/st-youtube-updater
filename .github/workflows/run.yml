name: YouTube Channels Update (ST)

# 08:00 по Баку = 04:00 UTC
on:
  schedule:
    - cron: "0 4 * * *"      # каждый день в 04:00 UTC
  workflow_dispatch:         # можно запустить вручную из UI GitHub

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Клонируем репозиторий
      - uses: actions/checkout@v4

      # 2️⃣ Устанавливаем Node и нужные зависимости (clasp, google‑auth‑library)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm i @google/clasp google-auth-library

      # 3️⃣ Авторизуемся в Google через сервис‑аккаунт
      - name: Authenticate clasp
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          # Сохраняем JSON‑ключ точно так, как он хранится в секрете
          printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
          npx clasp login --creds /tmp/sa.json

      # 4️⃣ Отправляем (push) текущий код в Apps Script‑проект
      - name: Push script to Apps Script
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          # Указываем, к какому проекту будем пушить
          npx clasp --script-id "$SCRIPT_ID" push

      # 5️⃣ Запускаем функцию updateYouTubeData через Execution API
      - name: Run updateYouTubeData via Execution API
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          # Получаем OAuth‑токен от сервис‑аккаунта
          ACCESS_TOKEN=$(node - <<'NODE'
          const {GoogleAuth}=require('google-auth-library');
          const key=JSON.parse(process.env.GCP_SA_KEY);
          const auth=new GoogleAuth({
            credentials:key,
            scopes:[
              'https://www.googleapis.com/auth/script.projects',
              'https://www.googleapis.com/auth/script.deployments',
              'https://www.googleapis.com/auth/script.external_request',
              'https://www.googleapis.com/auth/spreadsheets',
              'https://www.googleapis.com/auth/youtube.readonly',
              'https://www.googleapis.com/auth/script.scriptapp'
            ]
          });
          auth.getClient().then(c=>c.getAccessToken()).then(t=>console.log(t.token));
          NODE
          )
          # Вызов функции
          curl -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"function":"updateYouTubeData"}' \
            "https://script.googleapis.com/v1/scripts/${SCRIPT_ID}:run"
