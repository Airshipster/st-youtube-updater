name: Telegram Clean

on:
  schedule:
    - cron: '37 5 * * *'
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Call Apps Script
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          http_code="$(curl -sS -L -o "$response_file" -w "%{http_code}" -X POST "${{ secrets.APPS_SCRIPT_URL }}" -H "Content-Type: application/json" -d '{"action":"telegram_clean"}')"
          cat "$response_file"
          python3 - "$response_file" "$http_code" <<'PY'
          import json
          import sys

          path, http_code = sys.argv[1], int(sys.argv[2])
          body = open(path, encoding='utf-8').read()
          if http_code < 200 or http_code >= 300:
              raise SystemExit(f'Apps Script HTTP {http_code}: {body}')
          try:
              payload = json.loads(body)
          except Exception as exc:
              raise SystemExit(f'Apps Script returned non-JSON response: {exc}: {body}')
          if payload.get('success') is not True:
              raise SystemExit(f'Apps Script reported failure: {payload}')
          PY
