name: Telegram Poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Call Apps Script
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          ACTION_NAME: telegram_poll
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          def call_once():
              url = os.environ['APPS_SCRIPT_URL']
              body = json.dumps({'action': os.environ['ACTION_NAME']}).encode('utf-8')

              for _ in range(5):
                  req = urllib.request.Request(
                      url,
                      data=body,
                      headers={
                          'Content-Type': 'application/json',
                          'Content-Length': str(len(body)),
                      },
                      method='POST',
                  )
                  opener = urllib.request.build_opener(urllib.request.HTTPHandler)
                  try:
                      with opener.open(req, timeout=600) as resp:
                          status = resp.status
                          text = resp.read().decode('utf-8')
                          break
                  except urllib.error.HTTPError as exc:
                      if exc.code in (301, 302, 303, 307, 308) and exc.headers.get('Location'):
                          url = urllib.request.urljoin(url, exc.headers['Location'])
                          continue
                      status = exc.code
                      text = exc.read().decode('utf-8', errors='replace')
                      break
              else:
                  raise SystemExit('Apps Script redirect loop')

              print(text)
              if status < 200 or status >= 300:
                  raise SystemExit(f'Apps Script HTTP {status}: {text}')
              try:
                  payload = json.loads(text)
              except Exception as exc:
                  raise SystemExit(f'Apps Script returned non-JSON response: {exc}: {text}')
              if payload.get('success') is not True:
                  raise SystemExit(f'Apps Script reported failure: {payload}')

          for index in range(5):
              print(f'Poll pass {index + 1}/5')
              call_once()
              if index < 4:
                  time.sleep(60)
          PY
